<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #ededed;
      padding: 20px;
      text-align: center;
    }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .domain { font-size: 12px; color: #888; margin-bottom: 16px; }
    .capture-btn {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .capture-btn:hover { background: #ddd; }
    .capture-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .capture-btn.success { background: #22c55e; color: #fff; }
    .capture-btn.error { background: #ef4444; color: #fff; }
    .status { font-size: 11px; color: #888; margin-top: 12px; }
    .status.error { color: #ef4444; }
    .status.success { color: #22c55e; }
  </style>
</head>
<body>
  <h1>Engagent</h1>
  <p class="domain" id="domain"></p>
  <button class="capture-btn" id="captureBtn">Capture Cookies</button>
  <p class="status" id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
