<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emdash Integrations</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg-secondary: #f5f5f5;
        --border: #e0e0e0;
        --text: #111111;
        --text-muted: #666666;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --success: #16a34a;
        --error: #dc2626;
        --warning: #d97706;
        --radius: 8px;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1a1a;
          --bg-secondary: #2a2a2a;
          --border: #3a3a3a;
          --text: #f0f0f0;
          --text-muted: #999999;
          --accent: #3b82f6;
          --accent-hover: #60a5fa;
          --success: #22c55e;
          --error: #f87171;
          --warning: #fbbf24;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font);
        font-size: 13px;
        color: var(--text);
        background: var(--bg);
        width: 320px;
        padding: 12px;
        line-height: 1.4;
      }

      h1 {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 12px;
        color: var(--text);
      }

      .section {
        margin-bottom: 12px;
      }

      label {
        display: block;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 6px 8px;
        font-family: var(--font);
        font-size: 12px;
        color: var(--text);
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        outline: none;
        transition: border-color 0.15s;
      }

      input[type="text"]:focus,
      input[type="password"]:focus {
        border-color: var(--accent);
      }

      .input-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .input-row input {
        flex: 1;
      }

      .link-btn {
        font-size: 11px;
        color: var(--accent);
        text-decoration: none;
        white-space: nowrap;
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
        font-family: var(--font);
      }

      .link-btn:hover {
        color: var(--accent-hover);
        text-decoration: underline;
      }

      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 10px 0;
      }

      .provider-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 6px;
      }

      .provider-left {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .provider-icon {
        font-size: 16px;
        flex-shrink: 0;
      }

      .provider-info {
        min-width: 0;
      }

      .provider-name {
        font-weight: 500;
        font-size: 13px;
      }

      .provider-status {
        font-size: 11px;
        margin-top: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 160px;
      }

      .status-synced { color: var(--success); }
      .status-error { color: var(--error); }
      .status-warning { color: var(--warning); }
      .status-muted { color: var(--text-muted); }

      .sync-btn {
        font-family: var(--font);
        font-size: 11px;
        font-weight: 500;
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s, border-color 0.15s;
      }

      .sync-btn:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .sync-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .sync-btn:disabled:hover {
        background: var(--bg);
        border-color: var(--border);
        color: var(--text);
      }

      .sync-all-btn {
        font-family: var(--font);
        font-size: 12px;
        font-weight: 500;
        width: 100%;
        padding: 7px;
        border-radius: var(--radius);
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        transition: background 0.15s;
      }

      .sync-all-btn:hover {
        background: var(--accent-hover);
      }

      .sync-all-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>Emdash Integrations</h1>

    <div class="section">
      <label for="portal-url">Portal URL</label>
      <input
        type="text"
        id="portal-url"
        placeholder="https://your-portal.emdash.io"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div class="section">
      <label for="auth-token">Auth Token</label>
      <div class="input-row">
        <input
          type="password"
          id="auth-token"
          placeholder="Paste token from portal"
          autocomplete="off"
        />
        <button class="link-btn" id="open-portal">Open Portal</button>
      </div>
    </div>

    <hr class="divider" />

    <div id="providers">
      <!-- Provider cards rendered by popup.js -->
    </div>

    <button class="sync-all-btn" id="sync-all">Sync All</button>

    <script src="popup.js"></script>
  </body>
</html>
