<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emdash Integrations</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg-secondary: #f5f5f5;
        --border: #e0e0e0;
        --text: #111111;
        --text-muted: #666666;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --success: #16a34a;
        --error: #dc2626;
        --warning: #d97706;
        --radius: 8px;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1a1a;
          --bg-secondary: #2a2a2a;
          --border: #3a3a3a;
          --text: #f0f0f0;
          --text-muted: #999999;
          --accent: #3b82f6;
          --accent-hover: #60a5fa;
          --success: #22c55e;
          --error: #f87171;
          --warning: #fbbf24;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font);
        font-size: 13px;
        color: var(--text);
        background: var(--bg);
        width: 300px;
        padding: 12px;
        line-height: 1.4;
      }

      h1 {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .subtitle {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 12px;
      }

      .not-configured {
        text-align: center;
        padding: 20px 12px;
        color: var(--text-muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .not-configured strong {
        display: block;
        color: var(--text);
        font-size: 13px;
        margin-bottom: 4px;
      }

      .provider-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 6px;
      }

      .provider-left {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .provider-icon { font-size: 16px; flex-shrink: 0; }
      .provider-name { font-weight: 500; font-size: 13px; }

      .provider-status {
        font-size: 11px;
        margin-top: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 140px;
      }

      .status-synced { color: var(--success); }
      .status-error { color: var(--error); }
      .status-warning { color: var(--warning); }
      .status-muted { color: var(--text-muted); }

      .sync-btn {
        font-family: var(--font);
        font-size: 11px;
        font-weight: 500;
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s, border-color 0.15s;
      }

      .sync-btn:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .sync-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .portal-link {
        display: block;
        text-align: center;
        margin-top: 8px;
        font-size: 11px;
        color: var(--accent);
        text-decoration: none;
        cursor: pointer;
      }

      .portal-link:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <h1>Emdash Integrations</h1>
    <div class="subtitle" id="connection-status">Checking connection...</div>

    <div id="content">
      <!-- Rendered by popup.js -->
    </div>

    <script src="popup.js"></script>
  </body>
</html>
