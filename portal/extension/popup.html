<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emdash Cookie Copier</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0a0a0a;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      min-width: 280px;
      padding: 16px;
    }

    .header {
      margin-bottom: 12px;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      color: #fafafa;
      margin-bottom: 4px;
    }

    .domain {
      font-size: 12px;
      color: #737373;
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .domain.loading {
      color: #525252;
      font-style: italic;
      font-family: inherit;
    }

    button {
      width: 100%;
      padding: 8px 14px;
      background-color: #fafafa;
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.15s;
    }

    button:hover {
      background-color: #e5e5e5;
    }

    button:active {
      background-color: #d4d4d4;
    }

    button:disabled {
      background-color: #262626;
      color: #525252;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }

    .status.success {
      color: #4ade80;
    }

    .status.error {
      color: #f87171;
    }

    .status.info {
      color: #737373;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">Emdash Cookie Copier</div>
    <div class="domain loading" id="domain">Loading...</div>
  </div>
  <button id="copy-btn" disabled>Copy Cookies</button>
  <div class="status info" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
