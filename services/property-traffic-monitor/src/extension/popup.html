<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 320px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        font-size: 14px;
        color: #333;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }
      .status {
        padding: 8px;
        border-radius: 4px;
        margin-bottom: 12px;
        font-size: 13px;
      }
      .status.ok {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .status.error {
        background: #fce4ec;
        color: #c62828;
      }
      label {
        display: block;
        font-size: 12px;
        color: #666;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
        box-sizing: border-box;
      }
      button {
        margin-top: 8px;
        padding: 6px 16px;
        background: #1976d2;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover {
        background: #1565c0;
      }
      .sites {
        margin-top: 12px;
        font-size: 12px;
        color: #666;
      }
      .sites li {
        margin-bottom: 2px;
      }
    </style>
  </head>
  <body>
    <h1>Property Traffic Monitor</h1>
    <div id="status" class="status ok">Checking connection...</div>

    <label for="apiUrl">API Server URL</label>
    <input id="apiUrl" type="text" placeholder="http://localhost:8000" />
    <button id="save">Save</button>

    <div class="sites">
      <p><strong>Monitored sites:</strong></p>
      <ul>
        <li>PropertyShark</li>
        <li>ZoLa (NYC Planning)</li>
        <li>DOB BIS</li>
        <li>ACRIS</li>
        <li>NYC Property Portal</li>
        <li>Actovia</li>
        <li>CoStar</li>
      </ul>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
